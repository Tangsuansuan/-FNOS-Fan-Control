<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNOS 风扇控制 & 温度监控</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">🌀</span>
                <span class="logo-text">FNOS Fan Control</span>
            </div>
            <ul class="nav-items">
                <li class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">仪表盘</span>
                </li>
                <li class="nav-item" data-page="fans">
                    <span class="nav-icon">🌀</span>
                    <span class="nav-label">风扇控制</span>
                </li>
                <li class="nav-item" data-page="sensors">
                    <span class="nav-icon">🌡️</span>
                    <span class="nav-label">传感器</span>
                </li>
                <li class="nav-item" data-page="curve">
                    <span class="nav-icon">📈</span>
                    <span class="nav-label">温度曲线</span>
                </li>
                <li class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">设置</span>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="connection-status" id="ws-status">
                    <span class="status-dot disconnected"></span>
                    <span class="status-text">未连接</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Page -->
            <div class="page active" id="page-dashboard">
                <div class="page-header">
                    <h1>系统仪表盘</h1>
                    <div class="page-actions">
                        <button class="btn btn-sm" onclick="rescanSensors()">🔄 重新扫描</button>
                    </div>
                </div>

                <!-- Temperature Cards -->
                <div class="card-grid" id="temp-cards">
                    <!-- Dynamically populated -->
                </div>

                <!-- Main Charts -->
                <div class="chart-row">
                    <div class="chart-card">
                        <div class="chart-card-header">
                            <h3>温度趋势</h3>
                            <span class="chart-legend" id="temp-legend"></span>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="temp-chart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-card-header">
                            <h3>风扇转速</h3>
                            <span class="chart-legend" id="rpm-legend"></span>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="rpm-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Fan Status Cards -->
                <div class="card-grid" id="fan-cards">
                    <!-- Dynamically populated -->
                </div>

                <!-- Alerts -->
                <div id="alerts-container"></div>
            </div>

            <!-- Fan Control Page -->
            <div class="page" id="page-fans">
                <div class="page-header">
                    <h1>风扇控制</h1>
                </div>
                <div id="fan-control-list">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- Sensors Page -->
            <div class="page" id="page-sensors">
                <div class="page-header">
                    <h1>传感器列表</h1>
                    <div class="page-actions">
                        <button class="btn btn-sm" onclick="rescanSensors(true)">🔄 重新扫描全部</button>
                    </div>
                </div>
                <div class="sensors-container" id="sensors-list">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- Curve Editor Page -->
            <div class="page" id="page-curve">
                <div class="page-header">
                    <h1>温度曲线编辑器</h1>
                </div>
                <div class="curve-editor-container">
                    <div class="curve-editor-left">
                        <div class="curve-canvas-wrapper">
                            <canvas id="curve-editor" width="600" height="400"></canvas>
                        </div>
                        <div class="curve-editor-hint">
                            🖱️ 拖拽曲线节点调整 | 右键点击空白处添加节点 | 双击节点删除
                        </div>
                    </div>
                    <div class="curve-editor-right">
                        <div class="curve-fan-select">
                            <label>选择风扇:</label>
                            <select id="curve-fan-selector" onchange="selectFanForCurve()"></select>
                        </div>
                        <div class="curve-points-table">
                            <h4>曲线节点</h4>
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>温度 (°C)</th>
                                        <th>PWM (0-255)</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="curve-points-body">
                                </tbody>
                            </table>
                        </div>
                        <button class="btn btn-primary" onclick="saveCurve()">💾 保存曲线</button>
                        <button class="btn" onclick="resetCurve()">↺ 重置默认</button>
                    </div>
                </div>
            </div>

            <!-- Settings Page -->
            <div class="page" id="page-settings">
                <div class="page-header">
                    <h1>系统设置</h1>
                </div>
                <div class="settings-container">
                    <div class="settings-section">
                        <h3>控制参数</h3>
                        <div class="form-group">
                            <label>更新间隔 (秒)</label>
                            <input type="number" id="setting-update-interval" min="1" max="60" value="2">
                        </div>
                        <div class="form-group">
                            <label>历史数据保留点数</label>
                            <input type="number" id="setting-history-length" min="60" max="3600" value="300">
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>告警</h3>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="setting-enable-alerts">
                                启用温度告警
                            </label>
                        </div>
                        <div class="form-group">
                            <label>CPU 告警温度 (°C)</label>
                            <input type="number" id="setting-alert-cpu" min="50" max="120" value="85">
                        </div>
                        <div class="form-group">
                            <label>硬盘告警温度 (°C)</label>
                            <input type="number" id="setting-alert-disk" min="40" max="80" value="60">
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>SMART</h3>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="setting-enable-smartctl" checked>
                                启用 smartctl 硬盘温度
                            </label>
                        </div>
                        <div class="form-group">
                            <label>smartctl 路径</label>
                            <input type="text" id="setting-smartctl-path" value="/usr/sbin/smartctl">
                        </div>
                    </div>
                    <div class="settings-actions">
                        <button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button>
                        <button class="btn" onclick="exportConfig()">📤 导出配置</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
